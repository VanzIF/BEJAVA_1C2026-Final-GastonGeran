# Perfil de demo rapida: base de datos en memoria H2, no requiere instalar MySQL.
# Ejecutar con: ./mvnw spring-boot:run -Dspring-boot.run.profiles=h2
spring.datasource.url=jdbc:h2:mem:ecommerce_db;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true

# Consola web de H2 disponible en http://localhost:8080/h2-console
# JDBC URL: jdbc:h2:mem:ecommerce_db
spring.h2.console.enabled=true
